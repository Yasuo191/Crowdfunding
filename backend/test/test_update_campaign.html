<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật chiến dịch</title>
</head>
<body>

    <h2>Cập nhật chiến dịch</h2>

    <form action="../api/update_campaign.php" method="POST">

        <label>ID chiến dịch</label><br>
        <input
            type="number"
            name="id"
            required>
        <br><br>

        <label>Tiêu đề</label><br>
        <input
            type="text"
            name="title"
            required>
        <br><br>

        <label>Mô tả</label><br>
        <textarea
            name="description"
            rows="5"
            cols="50"
            required></textarea>
        <br><br>

        <label>Mục tiêu quyên góp (VNĐ)</label><br>
        <input
            type="number"
            name="target_amount"
            min="1000"
            required>
        <br><br>

        <label>Ngày bắt đầu</label><br>
        <input
            type="date"
            name="start_date"
            required>
        <br><br>

        <label>Ngày kết thúc</label><br>
        <input
            type="date"
            name="end_date"
            required>
        <br><br>

        <button type="submit">
            Cập nhật chiến dịch
        </button>

    </form>

</body>
</html>
