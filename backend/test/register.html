<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
</head>
<body>

    <h2>Đăng ký tài khoản</h2>

    <form action="http://localhost/crowdfunding/backend/api/register.php"
          method="POST">

        <label>Tên đăng nhập</label><br>
        <input
            type="text"
            name="username"
            placeholder="Nhập username"
            required>
        <br><br>

        <label>Email</label><br>
        <input
            type="email"
            name="email"
            placeholder="Nhập email"
            required>
        <br><br>

        <label>Mật khẩu</label><br>
        <input
            type="password"
            name="password"
            placeholder="Nhập mật khẩu"
            required>
        <br><br>

        <button type="submit">
            Đăng ký
        </button>

    </form>

    <br>

    <a href="login.html">
        Đã có tài khoản? Đăng nhập
    </a>

</body>
</html>
