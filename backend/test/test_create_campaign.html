<!DOCTYPE html>
<html>
<body>

<h2>Tạo chiến dịch</h2>

<form

action="http://localhost/crowdfunding/backend/api/campaign_create.php"
method="POST"
enctype="multipart/form-data">

    <input
        name="title"
        placeholder="Tên chiến dịch">

    <br><br>

    <textarea
        name="description"
        placeholder="Mô tả"></textarea>

    <br><br>
Ảnh chiến dịch

<br>

<input

type="file"

name="image"

accept="image/*">

<br><br>
    <input
        type="number"
        name="target_amount"
        placeholder="Mục tiêu gây quỹ">

    <br><br>

    <input
        type="date"
        name="start_date">

    <br><br>

    <input
        type="date"
        name="end_date">

    <br><br>

    <button type="submit">
        Tạo chiến dịch
    </button>

</form>

</body>
</html>
